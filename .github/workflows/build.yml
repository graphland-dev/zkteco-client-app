name: Build desktop app

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundles: packages/zk-gui/src-tauri/target/**/release/bundle/dmg/*.dmg
          - platform: macos-latest
            target: x86_64-apple-darwin
            bundles: packages/zk-gui/src-tauri/target/**/release/bundle/dmg/*.dmg
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: |
              packages/zk-gui/src-tauri/target/**/release/bundle/deb/*.deb
              packages/zk-gui/src-tauri/target/**/release/bundle/rpm/*.rpm
              packages/zk-gui/src-tauri/target/**/release/bundle/appimage/*.AppImage
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: |
              packages/zk-gui/src-tauri/target/**/release/bundle/msi/*.msi
              packages/zk-gui/src-tauri/target/**/release/bundle/nsis/*.exe

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/zk-gui/src-tauri

      - name: Install Linux system dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run zk-client tests
        run: bun run --filter @graphland/zkteco test

      - name: Build Tauri app
        run: bun run tauri build --target ${{ matrix.target }}
        working-directory: packages/zk-gui

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: zk-gui-${{ matrix.target }}
          path: ${{ matrix.bundles }}
          if-no-files-found: error

      - name: Attach bundles to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.bundles }}
